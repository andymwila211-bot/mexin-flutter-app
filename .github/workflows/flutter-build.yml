name: Flutter Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.19.x"
          cache: true

      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses

      - name: Install dependencies
        # If your app is in the root, remove 'cd mexin-flutter-app'
        # If it IS in that folder, keep it. 
        run: |
          cd mexin-flutter-app || echo "Directory not found, staying in root"
          flutter pub get

      - name: Build Debug APK
        run: |
          cd mexin-flutter-app || echo "Directory not found, staying in root"
          flutter build apk --debug
