name: Flutter Build
on:
  push:
    branches: [main]
  workflow_dispatch:

# FIX: Force the runner to use Node 24 for all actions globally
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # FIX: Use the latest stable versions available in 2026
      - name: Checkout code
        uses: actions/checkout@v4 

      # CRITICAL: Flutter 3.19+ often requires JDK 17 for Android builds
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.19.x"
          cache: true

      - name: Install dependencies
        run: |
          cd mexin-flutter-app
          flutter pub get

      - name: Build Debug APK
        run: |
          cd mexin-flutter-app
          flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: mexin-flutter-app/build/app/outputs/flutter-apk/app-debug.apk
